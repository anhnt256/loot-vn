name: Deploy to VPS v2

on:
  push:
    branches:
      - 'refactor/change-to-nx'
  workflow_dispatch:
    inputs:
      tenant_prefix:
        description: 'Tenant prefix for this deployment (e.g. tenant-a-)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: CI-CD

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/gateway-app/gms
            git fetch --all
            git checkout change-to-nx
            git reset --hard origin/change-to-nx

            # Determine tenant prefix
            TENANT_PREFIX="${{ github.event.inputs.tenant_prefix }}"

            # Ensure .env is updated from secrets
            cat > .env << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            FNET_GV_DATABASE_URL=${{ secrets.FNET_GV_DATABASE_URL }}
            FNET_TP_DATABASE_URL=${{ secrets.FNET_TP_DATABASE_URL }}
            GATEWAY_BONUS_DEADLINE=${{ secrets.GATEWAY_BONUS_DEADLINE }}
            IS_DEBUG_GO_VAP=${{ secrets.IS_DEBUG_GO_VAP }}
            IS_DEBUG_TAN_PHU=${{ secrets.IS_DEBUG_TAN_PHU }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NEXT_PUBLIC_GATEWAY_BIRTHDAY_ENABLE=${{ secrets.NEXT_PUBLIC_GATEWAY_BIRTHDAY_ENABLE }}
            NEXT_PUBLIC_IS_MAINTENANCE=${{ secrets.NEXT_PUBLIC_IS_MAINTENANCE }}
            NEXT_PUBLIC_SPEND_PER_ROUND=${{ secrets.NEXT_PUBLIC_SPEND_PER_ROUND }}
            NEXT_PUBLIC_STORE_DISABLED=${{ secrets.NEXT_PUBLIC_STORE_DISABLED }}
            NEXT_PUBLIC_UP_RATE_AMOUNT=${{ secrets.NEXT_PUBLIC_UP_RATE_AMOUNT }}
            NEXT_PUBLIC_GATEWAY_BATTLE_PASS_ENABLE=${{ secrets.NEXT_PUBLIC_GATEWAY_BATTLE_PASS_ENABLE }}
            NEXT_PUBLIC_GATEWAY_BATTLE_PASS_PREMIUM_ENABLE=${{ secrets.NEXT_PUBLIC_GATEWAY_BATTLE_PASS_PREMIUM_ENABLE }}
            USE_DEFAULT_USER_ID=${{ secrets.USE_DEFAULT_USER_ID }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            NEXT_PUBLIC_CALENDAR_GV=${{ secrets.NEXT_PUBLIC_CALENDAR_GV }}
            NEXT_PUBLIC_CALENDAR_TP=${{ secrets.NEXT_PUBLIC_CALENDAR_TP }}
            NODE_ENV=production
            TENANT_PREFIX=$TENANT_PREFIX
            VITE_TENANT_PREFIX=$TENANT_PREFIX
            EOF

            # Build and deploy all services using docker-compose
            docker compose -p gateway-refactor up -d --build --remove-orphans

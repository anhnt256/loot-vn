name: Deploy to VPS v2

on:
  workflow_dispatch:
    inputs:
      tenant_prefix:
        description: "Tenant prefix for this deployment"
        type: choice
        required: true
        options:
          - gateway-go-vap
          - gateway-tan-phu
          - to-hieu
      base_domain:
        description: "Base domain for the deployment"
        type: choice
        required: true
        default: "loot.vn"
        options:
          - loot.vn
          - quanlyhifriends.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: CI-CD

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            mkdir -p /var/www/gateway-app
            if [ ! -d "/var/www/gateway-app/gms/.git" ]; then
              echo "Directory does not exist or is not a git repository. Cloning..."
              rm -rf /var/www/gateway-app/gms
              cd /var/www/gateway-app
              git clone -b refactor/change-to-nx git@github.com:anhnt256/loot-vn.git gms
              cd gms
            else
              echo "Directory exists. Fetching updates..."
              cd /var/www/gateway-app/gms
              git fetch --all
              git checkout refactor/change-to-nx
              git reset --hard origin/refactor/change-to-nx
            fi

            # Determine tenant prefix
            RAW_PREFIX="${{ github.event.inputs.tenant_prefix }}"

            # Remove trailing dash for project name if exists
            PROJECT_NAME="${RAW_PREFIX%-}"
            if [ -z "$PROJECT_NAME" ]; then
              PROJECT_NAME="gateway-refactor"
            fi

            # Ensure prefix for containers has a trailing dash
            TENANT_PREFIX="${PROJECT_NAME}-"

            # Base domain must not be empty (else VITE_API_URL becomes https://api-xxx./ )
            BASE_DOMAIN="${{ github.event.inputs.base_domain }}"
            if [ -z "$BASE_DOMAIN" ]; then BASE_DOMAIN="loot.vn"; fi

            # Ensure .env is updated from secrets
            cat > .env << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            FNET_GV_DATABASE_URL=${{ secrets.FNET_GV_DATABASE_URL }}
            FNET_TP_DATABASE_URL=${{ secrets.FNET_TP_DATABASE_URL }}
            DATABASE_GMS_URL=${{ secrets.DATABASE_GMS_URL }}
            GATEWAY_BONUS_DEADLINE=${{ secrets.GATEWAY_BONUS_DEADLINE }}
            IS_DEBUG_GO_VAP=${{ secrets.IS_DEBUG_GO_VAP }}
            IS_DEBUG_TAN_PHU=${{ secrets.IS_DEBUG_TAN_PHU }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            USE_DEFAULT_USER_ID=${{ secrets.USE_DEFAULT_USER_ID }}
            NODE_ENV=production
            TENANT_PREFIX=$TENANT_PREFIX
            VITE_TENANT_PREFIX=$TENANT_PREFIX
            BASE_DOMAIN=$BASE_DOMAIN
            API_PATH=api-${PROJECT_NAME}.${BASE_DOMAIN}
            ADMIN_PATH=admin-${PROJECT_NAME}.${BASE_DOMAIN}
            HR_PATH=hr-${PROJECT_NAME}.${BASE_DOMAIN}
            HR_MANAGER_PATH=hr-manager-${PROJECT_NAME}.${BASE_DOMAIN}
            CLIENT_PATH=client-${PROJECT_NAME}.${BASE_DOMAIN}
            MASTER_PATH=${TENANT_PREFIX}.${BASE_DOMAIN}
            VITE_API_URL=https://api-${PROJECT_NAME}.${BASE_DOMAIN}
            EOF

            # Build and deploy all services using docker-compose
            docker compose -p ${PROJECT_NAME} up -d --build --remove-orphans

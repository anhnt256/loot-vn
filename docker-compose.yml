services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: api
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}gateway-api
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PORT=7300
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network # Để Nginx Proxy Manager nhìn thấy API này

  # Frontend Service (Next.js) - Removed as Next JS frontend is not in project.json list
  # frontend and fraud detection were removed from docker-compose.yml
  # Tenant Manage App (Vite)
  tenant-manage:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: tenant-manage
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}tenant-manage
    environment:
      - PORT=7500
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network


  # Master App (Vite)
  master:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: master
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}master
    environment:
      - PORT=7700
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network

  # HR App (Vite)
  hr:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: hr
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}hr
    environment:
      - PORT=7600
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network

  # Manager App (Vite)
  hr-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: hr-manager
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}hr-manager
    environment:
      - PORT=7400
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network



networks:
  # Mạng nội bộ: Tự động tạo tên duy nhất trên VPS (VD: lootvn-govap-internal)
  internal-network:
    name: ${TENANT_PREFIX:-}internal
    driver: bridge

  # Mạng Proxy: Kết nối vào mạng có sẵn của Nginx Proxy Manager
  proxy-network:
    external: true
    name: nginx-proxy-manager_default

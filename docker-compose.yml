x-build-defaults: &build-defaults
  context: .
  dockerfile: Dockerfile
  args:
    VITE_API_URL: ${VITE_API_URL:-}
    VITE_TENANT_PREFIX: ${VITE_TENANT_PREFIX:-}

services:
  # Redis - dùng chung cho tất cả tenant, bật AOF persistence để không mất data khi restart
  redis:
    image: redis:7-alpine
    container_name: ${TENANT_PREFIX:-}redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - internal-network

  # API Service
  api:
    build:
      <<: *build-defaults
      target: api
    container_name: ${TENANT_PREFIX:-}gateway-api
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PORT=7300
      - HOST=0.0.0.0
      - REDIS_HOST=redis
    env_file:
      - .env
    restart: always
    depends_on:
      - redis
    networks:
      - internal-network
      - proxy-network

  # Admin App (Vite)
  admin:
    build:
      <<: *build-defaults
      target: admin
    container_name: ${TENANT_PREFIX:-}admin
    environment:
      - PORT=7800
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network

  # Tenant Manage App (Vite)
  tenant-manage:
    build:
      <<: *build-defaults
      target: tenant-manage
    container_name: ${TENANT_PREFIX:-}tenant-manage
    environment:
      - PORT=7500
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network

  # Master App (Vite)
  master:
    build:
      <<: *build-defaults
      target: master
    container_name: ${TENANT_PREFIX:-}master
    environment:
      - PORT=7700
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network

  # HR App (Vite)
  hr:
    build:
      <<: *build-defaults
      target: hr
    container_name: ${TENANT_PREFIX:-}hr
    environment:
      - PORT=7600
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network

  # HR Manager App (Vite)
  hr-manager:
    build:
      <<: *build-defaults
      target: hr-manager
    container_name: ${TENANT_PREFIX:-}hr-manager
    environment:
      - PORT=7400
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network

volumes:
  redis-data:
    name: ${TENANT_PREFIX:-}redis-data

networks:
  internal-network:
    name: ${TENANT_PREFIX:-}internal
    driver: bridge

  proxy-network:
    external: true
    name: nginx-proxy-manager_default

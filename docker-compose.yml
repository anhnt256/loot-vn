version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: api
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}gateway-api
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PORT=3000
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

  # Frontend Service (Next.js) - Removed as Next JS frontend is not in project.json list
  # frontend and fraud detection were removed from docker-compose.yml
  # Tenant Manage App (Vite)
  tenant-manage-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: tenant-manage-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}tenant-manage-app
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network


  # Master App (Vite)
  master-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: master-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}master-app
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

  # HR App (Vite)
  hr-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: hr-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}hr-app
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

  # Manager App (Vite)
  hr-manager-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: hr-manager-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}hr-manager-app
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network



networks:
  loot-vn-network:
    driver: bridge

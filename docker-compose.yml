version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: api
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}gateway-api
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PORT=3000
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: always
    networks:
      - loot-vn-network

  # Frontend Service (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: frontend
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}gateway-frontend
    ports:
      - "${FRONTEND_PORT:-4000}:3000"
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

  # Tenant Manage App (Vite)
  tenant-manage-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: tenant-manage-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}tenant-manage-app
    ports:
      - "${TENANT_MANAGE_PORT:-7500}:7500"
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

  # User App (Vite)
  user-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: user-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}user-app
    ports:
      - "${USER_APP_PORT:-7100}:7100"
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

  # Admin App (Vite)
  admin-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: admin-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}admin-app
    ports:
      - "${ADMIN_APP_PORT:-7200}:7200"
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

  # HR App (Vite)
  hr-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: hr-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}hr-app
    ports:
      - "${HR_APP_PORT:-7600}:7600"
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

  # Manager App (Vite)
  hr-manager-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: hr-manager-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}hr-manager-app
    ports:
      - "${MANAGER_APP_PORT:-7400}:7400"
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

  # Fraud Detection Service (Node)
  fraud-detection:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: fraud-detection
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}fraud-detection
    environment:
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "${FRAUD_DETECTION_PORT:-3001}:3001"
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

  redis:
    image: redis:latest
    container_name: ${TENANT_PREFIX:-}redis-local
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    env_file:
      - .env
    restart: always
    networks:
      - loot-vn-network

volumes:
  redis_data:

networks:
  loot-vn-network:
    driver: bridge

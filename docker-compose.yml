services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: api
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}gateway-api
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PORT=3000
    env_file:
      - .env
    restart: always
    networks:
      - internal-network
      - proxy-network # Để Nginx Proxy Manager nhìn thấy API này

  # Frontend Service (Next.js) - Removed as Next JS frontend is not in project.json list
  # frontend and fraud detection were removed from docker-compose.yml
  # Tenant Manage App (Vite)
  tenant-manage-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: tenant-manage-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}tenant-manage-app
    env_file:
      - .env
    restart: always
    networks:
      - internal-network


  # Master App (Vite)
  master-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: master-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}master-app
    env_file:
      - .env
    restart: always
    networks:
      - internal-network

  # HR App (Vite)
  hr-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: hr-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}hr-app
    env_file:
      - .env
    restart: always
    networks:
      - internal-network

  # Manager App (Vite)
  hr-manager-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: hr-manager-app
        TENANT_PREFIX: ${TENANT_PREFIX:-}
    container_name: ${TENANT_PREFIX:-}hr-manager-app
    env_file:
      - .env
    restart: always
    networks:
      - internal-network



networks:
  # Mạng nội bộ: Tự động tạo tên duy nhất trên VPS (VD: lootvn-govap-internal)
  internal-network:
    name: ${TENANT_PREFIX:-}internal
    driver: bridge

  # Mạng Proxy: Kết nối vào mạng có sẵn của Nginx Proxy Manager
  proxy-network:
    external: true
    name: nginx-proxy-manager_default
